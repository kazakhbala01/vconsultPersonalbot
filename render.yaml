# render.yaml — Render.com Blueprint
# https://render.com/docs/blueprint-spec

services:
  - type: worker           # worker = без HTTP, идеально для polling-бота
    name: docagent-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: frankfurt       # Ближайший к Астане
    plan: free              # Бесплатный (но засыпает!)
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: DATABASE_URL
        sync: false
